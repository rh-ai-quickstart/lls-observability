# Default values for llama-guard
replicaCount: 1

device: gpu # Options: gpu, xeon
image:
  gpu:
    repository: "quay.io/modh/vllm@sha256"
    tag: "4f550996130e7d16cacb24ca9a2865e7cf51eddaab014ceaf31a1ea6ef86d4ec"
    pullPolicy: IfNotPresent
    env:
      CUDA_VISIBLE_DEVICES: "0"
      TRANSFORMERS_CACHE: "/tmp/hf_home"
      HF_HOME: "/tmp/hf_home"
  xeon:
    repository: "image-registry.openshift-image-registry.svc:5000/openshift/vllm-xeon-opentelemetry"
    tag: "v0.14.1-ubi9"
    pullPolicy: IfNotPresent
    env:
      VLLM_CPU_KVCACHE_SPACE: 4
      TRANSFORMERS_CACHE: "/tmp/hf_home"
      HF_HOME: "/tmp/hf_home"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: false
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL

# Model configuration
model:
  name: "meta-llama/Llama-Guard-3-1B"
  maxModelLen: 24000
  # gpuMemoryUtilization: 0.40
  # quantization: ""  # Options: awq, gptq, squeezellm, fp8
  # dtype: "half"     # Options: auto, half, float16, bfloat16, float32
  
# vLLM server configuration
vllm:
  host: "0.0.0.0"
  port: 8080
  apiKey: ""  # Optional API key
  enableLogging: true
  logLevel: "info"
  maxLogLen: 2048
  disableLogStats: false
  disableLogRequests: false

# Data connection for model storage
dataConnection:
  enabled: true
  name: "my-storage"
  accessKeyId: ""
  secretAccessKey: ""
  endpoint: ""
  bucket: "models"
  region: "us-east-1"

service:
  type: ClusterIP
  port: 80
  targetPort: 8080
  annotations: {}

route:
  enabled: true
  annotations: {}
  host: ""
  tls:
    enabled: true
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: llama-guard.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Resource requirements (adjust based on GPU availability)
resources:
  gpu:
    requests:
      nvidia.com/gpu: 1
      memory: 8Gi
      cpu: 4
    limits:
      nvidia.com/gpu: 1
      memory: 10Gi
      cpu: 8
  xeon:
    requests:
      cpu: 4
      memory: 16Gi
    limits:
      cpu: 16
      memory: 32Gi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 3

readinessProbe:
  tcpSocket:
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 1
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# For Xeon deployments, you can use node selectors, tolerations and affinity to target appropriate nodes,
# when your cluster has a mix of older and newer CPU generations.
# Adjust these based on your cluster's labeling and tainting strategy.
nodeSelector:
  gpu:
    nvidia.com/gpu.present: "true"
# xeon:
#   intel.com/cpu-gen: "spr"
#   intel.com/cpu-gen: "emr"
#   intel.com/cpu-gen: "gnr"

tolerations:
  gpu:
  - effect: NoSchedule
    operator: Exists
# xeon:
# - effect: NoSchedule
#   operator: Exists

affinity:
  gpu:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: nvidia.com/gpu.present
            operator: In
            values:
            - "true"
# xeon:
#   nodeAffinity:
#     requiredDuringSchedulingIgnoredDuringExecution:
#       nodeSelectorTerms:
#       - matchExpressions:
#         # Use taints and labels to target specific CPU generations for optimal performance
#         - key: intel.com/cpu-gen
#           operator: In
#           values: ["spr", "emr", "gnr"]

# Persistent Volume for model cache
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 10Gi
  mountPath: /tmp/hf_home

# InferenceService configuration
inferenceService:
  displayName: "Llama-Guard-3-1B"
  maxReplicas: 1
  minReplicas: 1
  modelFormat: "vLLM"
  modelName: ""
  runtime: ""  # Will default to chart fullname if not specified
  storageUri: "oci://quay.io/rh-aiservices-bu/llama-guard-3-1b-modelcar:2.0.0"

# Serving Runtime configuration
servingRuntime:
  enabled: true  # Set to true to create a ServingRuntime resource
  tensorParallelSize: 1
  shmSizeLimit: "2Gi"
  memBufferBytes: 134217728  # 128MB
  modelLoadingTimeoutMillis: 90000  # 90 seconds
  distributedExecutorBackend: "mp"
  
  # OpenTelemetry tracing configuration
  tracing:
    enabled: true
    otlpTracesEndpoint: "grpc://otel-collector-collector.observability-hub.svc.cluster.local:4317"
    collectDetailedTraces: "all"
    serviceName: "vllm-llama-guard"
    insecure: true

# Network Policies
networkPolicy:
  enabled: true
  ingress:
    - from:
      - namespaceSelector:
          matchLabels:
            name: openshift-ingress
      ports:
      - protocol: TCP
        port: 8080
    - from:
      - podSelector:
          matchLabels:
            app.kubernetes.io/name: llama-stack
      ports:
      - protocol: TCP
        port: 8080